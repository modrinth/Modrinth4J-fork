openapi: 3.1.0
info:
  title: Labrinth
  description: ""
  license:
    name: AGPL-3.0-only
    identifier: AGPL-3.0-only
  version: 2.7.0
paths:
  /_internal/affiliate:
    get:
      operationId: get_all
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  description: >-
                    Affiliate code used to track referral purchases.


                    When a user follows a URL with [`AffiliateCode::id`] as an
                    affiliate

                    parameter, the code will be saved as a cookie. When the same
                    user purchases

                    a product with an affiliate code cookie, the purchase under
                    that code is

                    tracked.


                    This struct contains information which is allowed to be seen
                    by an

                    affiliate.
                  required:
                    - id
                    - affiliate
                    - source_name
                  properties:
                    affiliate:
                      $ref: "#/components/schemas/UserId"
                      description: User who refers the purchaser.
                    created_at:
                      type:
                        - string
                        - "null"
                      format: date-time
                      description: When the code was created.
                    created_by:
                      oneOf:
                        - type: "null"
                        - $ref: "#/components/schemas/UserId"
                          description: User who created the code.
                    id:
                      $ref: "#/components/schemas/AffiliateCodeId"
                      description: Affiliate code ID.
                    source_name:
                      type: string
                      description: >-
                        Affiliate-defined name for this affiliate code - where
                        the click came

                        from.
    put:
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRequest"
        required: true
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                type: object
                description: >-
                  Affiliate code used to track referral purchases.


                  When a user follows a URL with [`AffiliateCode::id`] as an
                  affiliate

                  parameter, the code will be saved as a cookie. When the same
                  user purchases

                  a product with an affiliate code cookie, the purchase under
                  that code is

                  tracked.


                  This struct contains information which is allowed to be seen
                  by an

                  affiliate.
                required:
                  - id
                  - affiliate
                  - source_name
                properties:
                  affiliate:
                    $ref: "#/components/schemas/UserId"
                    description: User who refers the purchaser.
                  created_at:
                    type:
                      - string
                      - "null"
                    format: date-time
                    description: When the code was created.
                  created_by:
                    oneOf:
                      - type: "null"
                      - $ref: "#/components/schemas/UserId"
                        description: User who created the code.
                  id:
                    $ref: "#/components/schemas/AffiliateCodeId"
                    description: Affiliate code ID.
                  source_name:
                    type: string
                    description: >-
                      Affiliate-defined name for this affiliate code - where the
                      click came

                      from.
  /_internal/affiliate/ingest-click:
    post:
      operationId: ingest_click
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestClick"
        required: true
      responses: {}
  /_internal/affiliate/{id}:
    get:
      operationId: get
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AffiliateCodeId"
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                type: object
                description: >-
                  Affiliate code used to track referral purchases.


                  When a user follows a URL with [`AffiliateCode::id`] as an
                  affiliate

                  parameter, the code will be saved as a cookie. When the same
                  user purchases

                  a product with an affiliate code cookie, the purchase under
                  that code is

                  tracked.


                  This struct contains information which is allowed to be seen
                  by an

                  affiliate.
                required:
                  - id
                  - affiliate
                  - source_name
                properties:
                  affiliate:
                    $ref: "#/components/schemas/UserId"
                    description: User who refers the purchaser.
                  created_at:
                    type:
                      - string
                      - "null"
                    format: date-time
                    description: When the code was created.
                  created_by:
                    oneOf:
                      - type: "null"
                      - $ref: "#/components/schemas/UserId"
                        description: User who created the code.
                  id:
                    $ref: "#/components/schemas/AffiliateCodeId"
                    description: Affiliate code ID.
                  source_name:
                    type: string
                    description: >-
                      Affiliate-defined name for this affiliate code - where the
                      click came

                      from.
    delete:
      operationId: delete
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AffiliateCodeId"
      responses: {}
    patch:
      operationId: patch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/AffiliateCodeId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchRequest"
        required: true
      responses: {}
  /_internal/campaign/pride-26:
    get:
      operationId: pride_26
      responses: {}
  /_internal/campaign/webhook:
    post:
      operationId: tiltify_webhook
      responses: {}
  /_internal/globals:
    get:
      summary: Gets configured global non-secret variables for this backend instance.
      operationId: get_globals
      responses: {}
  /_internal/moderation/external-license/by-sha1/{sha1}:
    get:
      operationId: get_by_sha1
      parameters:
        - name: sha1
          in: path
          required: true
          schema:
            type: string
      responses: {}
  /_internal/moderation/external-license/search:
    post:
      operationId: search
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchRequest"
        required: true
      responses: {}
  /_internal/moderation/external-license/{id}:
    patch:
      operationId: update_license
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLicenseRequest"
        required: true
      responses: {}
  /_internal/moderation/lock/{project_id}:
    get:
      summary: Check the lock status for a project
      operationId: get_lock_status
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LockStatusResponse"
        "404":
          description: Project not found
    post:
      summary: >-
        Acquire or refresh a moderation lock on a project.

        Returns success if acquired, or info about who holds the lock if
        blocked.
      operationId: acquire_lock
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LockAcquireResponse"
        "404":
          description: Project not found
    delete:
      summary: Release a moderation lock on a project
      operationId: release_lock
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LockReleaseResponse"
        "404":
          description: Project not found
  /_internal/moderation/lock/{project_id}/override:
    post:
      summary: Force-acquire a moderation lock on a project (moderator override).
      operationId: override_lock
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LockAcquireResponse"
        "404":
          description: Project not found
  /_internal/moderation/lock/{project_id}/release:
    post:
      summary: Release a moderation lock using credentials in the request body.
      description: >-
        For use with `navigator.sendBeacon`, which cannot set `Authorization` or
        send `DELETE`.

        The body must be `text/plain` containing the same token value as the
        `Authorization` header

        (optional `Bearer ` prefix). This avoids a CORS preflight compared to
        `application/json`.
      operationId: release_lock_beacon
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        description: Token value (same as Authorization header)
        content:
          text/plain:
            schema:
              type: string
        required: true
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LockReleaseResponse"
        "404":
          description: Project not found
  /_internal/moderation/locks:
    delete:
      summary: Delete all moderation locks (admin only)
      operationId: delete_all_locks
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAllLocksResponse"
        "401":
          description: Not an admin
  /_internal/moderation/project:
    post:
      summary: Update moderation judgements for projects in the review queue.
      operationId: set_project_meta
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                $ref: "#/components/schemas/Judgement"
              propertyNames:
                type: string
        required: true
      responses: {}
  /_internal/moderation/project/{id}:
    get:
      summary: Fetch moderation metadata for a specific project.
      operationId: get_project_meta
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                type: array
                items:
                  allOf:
                    - $ref: "#/components/schemas/ProjectQuery"
                    - type: object
                      required:
                        - id
                        - project_types
                        - games
                        - team_id
                        - name
                        - summary
                        - description
                        - published
                        - updated
                        - status
                        - license
                        - downloads
                        - followers
                        - categories
                        - additional_categories
                        - loaders
                        - versions
                        - link_urls
                        - gallery
                        - thread_id
                        - monetization_status
                        - side_types_migration_review_status
                      properties:
                        additional_categories:
                          type: array
                          items:
                            type: string
                          description: A list of the categories that the project is in.
                        approved:
                          type:
                            - string
                            - "null"
                          format: date-time
                          description: The date at which the project was first approved.
                        categories:
                          type: array
                          items:
                            type: string
                          description: A list of the categories that the project is in.
                        color:
                          type:
                            - integer
                            - "null"
                          format: int32
                          description: The color of the project (picked from icon)
                          minimum: 0
                        description:
                          type: string
                          description: A long form description of the project.
                        downloads:
                          type: integer
                          format: int32
                          description: The total number of downloads the project has had.
                          minimum: 0
                        followers:
                          type: integer
                          format: int32
                          description: The total number of followers this project has accumulated
                          minimum: 0
                        gallery:
                          type: array
                          items:
                            $ref: "#/components/schemas/GalleryItem"
                          description: A string of URLs to visual content featuring the project
                        games:
                          type: array
                          items:
                            type: string
                          description: The aggregated games of the versions of this project
                        icon_url:
                          type:
                            - string
                            - "null"
                          description: The URL of the icon of the project
                        id:
                          $ref: "#/components/schemas/ProjectId"
                          description: The ID of the project, encoded as a base62 string.
                        license:
                          $ref: "#/components/schemas/License"
                          description: The license of this project
                        link_urls:
                          type: object
                          description: A collection of links to the project's various pages.
                          additionalProperties:
                            $ref: "#/components/schemas/Link"
                          propertyNames:
                            type: string
                        loaders:
                          type: array
                          items:
                            type: string
                          description: A list of loaders this project supports
                        moderator_message:
                          oneOf:
                            - type: "null"
                            - $ref: "#/components/schemas/ModeratorMessage"
                              description: |-
                                DEPRECATED: moved to threads system
                                The rejection data of the project
                        monetization_status:
                          $ref: "#/components/schemas/MonetizationStatus"
                          description: The monetization status of this project
                        name:
                          type: string
                          description: The title or name of the project.
                        organization:
                          oneOf:
                            - type: "null"
                            - $ref: "#/components/schemas/OrganizationId"
                              description: The optional organization of people that have ownership of this
                                project.
                        project_types:
                          type: array
                          items:
                            type: string
                          description: The aggregated project typos of the versions of this project
                        published:
                          type: string
                          format: date-time
                          description: The date at which the project was first published.
                        queued:
                          type:
                            - string
                            - "null"
                          format: date-time
                          description: The date at which the project entered the moderation queue
                        requested_status:
                          oneOf:
                            - type: "null"
                            - $ref: "#/components/schemas/ProjectStatus"
                              description: The requested status of this project
                        side_types_migration_review_status:
                          $ref: "#/components/schemas/SideTypesMigrationReviewStatus"
                          description: The status of the manual review of the migration of side types of
                            this project
                        slug:
                          type:
                            - string
                            - "null"
                          description: The slug of a project, used for vanity URLs
                        status:
                          $ref: "#/components/schemas/ProjectStatus"
                          description: The status of the project
                        summary:
                          type: string
                          description: A short description of the project.
                        team_id:
                          $ref: "#/components/schemas/TeamId"
                          description: The team of people that has ownership of this project.
                        thread_id:
                          $ref: "#/components/schemas/ThreadId"
                          description: The thread of the moderation messages of the project
                        updated:
                          type: string
                          format: date-time
                          description: The date at which the project was first published.
                        versions:
                          type: array
                          items:
                            $ref: "#/components/schemas/VersionId"
                          description: A list of ids for versions of the project.
                      additionalProperties:
                        type: array
                        items: {}
                        description: Aggregated loader-fields across its myriad of versions
                  description: A project returned from the API
  /_internal/moderation/projects:
    get:
      summary: Fetch all projects which are in the moderation queue.
      operationId: get_projects
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                type: array
                items:
                  allOf:
                    - $ref: "#/components/schemas/Project"
                      description: Project info.
                    - type: object
                      required:
                        - ownership
                        - external_dependencies_count
                      properties:
                        external_dependencies_count:
                          type: integer
                          format: int64
                          description: How many external file dependencies the project has.
                        ownership:
                          $ref: "#/components/schemas/Ownership"
                          description: Who owns the project.
                  description: >-
                    Project with extra information fetched from the database, to
                    avoid having

                    clients make more round trips.
  /_internal/moderation/tech-review/issue-detail:
    patch:
      summary: Updates the state of a technical review issue detail.
      description: >-
        This will not automatically reject the project for malware, but just
        flag

        this issue with a verdict.
      operationId: update_issue_details
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/UpdateIssue"
        required: true
      responses:
        "204":
          description: ""
      security:
        - bearer_auth: []
  /_internal/moderation/tech-review/issue/{issue_id}:
    get:
      summary: Get info on an issue in a Delphi report.
      operationId: get_issue
      parameters:
        - name: issue_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DelphiReportIssueId"
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                type: object
                description: >-
                  Issue raised by Delphi in a flagged file.


                  The issue is scoped to the JAR, not any specific class, but
                  issues can be

                  raised because they appeared in a class - see
                  [`FileIssueDetails`].
                required:
                  - id
                  - report_id
                  - issue_type
                properties:
                  details:
                    type: array
                    items:
                      $ref: "#/components/schemas/ReportIssueDetail"
                    description: >-
                      Details of why this issue might have been raised, such as
                      what file it

                      was found in.
                  id:
                    $ref: "#/components/schemas/DelphiReportIssueId"
                    description: ID of the issue.
                  issue_type:
                    type: string
                    description: >-
                      Delphi-determined kind of issue that this is, e.g.
                      `OBFUSCATED_NAMES`.


                      Labrinth does not know the full set of kinds of issues, so
                      this is kept

                      as a string.
                  report_id:
                    $ref: "#/components/schemas/DelphiReportId"
                    description: ID of the report this issue is a part of.
      security:
        - bearer_auth: []
  /_internal/moderation/tech-review/project/{id}:
    get:
      summary: Gets the technical review report for a specific project.
      operationId: get_project_report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProjectId"
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                type: object
                description: Response for a single project's technical review report.
                required:
                  - thread
                properties:
                  project_report:
                    oneOf:
                      - type: "null"
                      - $ref: "#/components/schemas/ProjectReport"
                        description: The project's technical review report.
                  thread:
                    $ref: "#/components/schemas/Thread"
                    description: The moderation thread for this project.
      security:
        - bearer_auth: []
  /_internal/moderation/tech-review/report:
    put:
      summary: >-
        Adds a file to the technical review queue by adding an empty report, if
        one

        does not already exist for it.
      operationId: add_report
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddReport"
        required: true
      responses: {}
  /_internal/moderation/tech-review/report/{id}:
    get:
      summary: Get info on a specific report for a project.
      operationId: get_report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/DelphiReportId"
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                type: object
                required:
                  - report_id
                  - file_id
                  - created
                  - flag_reason
                  - severity
                  - file_name
                  - file_size
                  - download_url
                properties:
                  created:
                    type: string
                    format: date-time
                    description: When the report for this file was created.
                  download_url:
                    type: string
                    description: URL to download the flagged file.
                  file_id:
                    $ref: "#/components/schemas/FileId"
                    description: ID of the file that was scanned.
                  file_name:
                    type: string
                    description: Name of the flagged file.
                  file_size:
                    type: integer
                    format: int32
                    description: Size of the flagged file, in bytes.
                  flag_reason:
                    $ref: "#/components/schemas/FlagReason"
                    description: Why this project was flagged.
                  issues:
                    type: array
                    items:
                      $ref: "#/components/schemas/FileIssue"
                    description: What issues appeared in the file.
                  report_id:
                    $ref: "#/components/schemas/DelphiReportId"
                    description: ID of this report.
                  severity:
                    $ref: "#/components/schemas/DelphiSeverity"
                    description: According to this report, how likely is the project malicious?
      security:
        - bearer_auth: []
  /_internal/moderation/tech-review/search:
    post:
      summary: Searches all projects which are awaiting technical review.
      operationId: search_projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchProjects"
        required: true
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  description: See [`search_projects`].
                  required:
                    - project_reports
                    - projects
                    - threads
                    - ownership
                  properties:
                    ownership:
                      type: object
                      description: Fetched owner information for projects.
                      additionalProperties:
                        $ref: "#/components/schemas/Ownership"
                      propertyNames:
                        type: integer
                        format: int64
                        minimum: 0
                    project_reports:
                      type: array
                      items:
                        $ref: "#/components/schemas/ProjectReport"
                      description: List of reported projects returned, and their report data.
                    projects:
                      type: object
                      description: Fetched project information for projects in the returned reports.
                      additionalProperties:
                        $ref: "#/components/schemas/ProjectModerationInfo"
                      propertyNames:
                        type: integer
                        format: int64
                        minimum: 0
                    threads:
                      type: object
                      description: Fetched moderation threads for projects in the returned reports.
                      additionalProperties:
                        $ref: "#/components/schemas/Thread"
                      propertyNames:
                        type: integer
                        format: int64
                        minimum: 0
      security:
        - bearer_auth: []
  /_internal/moderation/tech-review/submit/{project_id}:
    post:
      summary: Submits a verdict for a project based on its technical reports.
      description: >-
        Before this is called, all issues for this project's reports must have
        been

        marked as either safe or unsafe. Otherwise, this will error with

        [`ApiError::TechReviewIssuesWithNoVerdict`], providing the issue IDs
        which

        are still unmarked.
      operationId: submit_report
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/ProjectId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitReport"
        required: true
      responses:
        "204":
          description: ""
      security:
        - bearer_auth: []
  /_internal/search-managementtasks:
    get:
      operationId: tasks
      responses: {}
    delete:
      operationId: tasks_cancel
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TasksCancelFilter"
        required: true
      responses: {}
  /_internal/server-ping/minecraft-java:
    post:
      operationId: ping_minecraft_java
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PingRequest"
        required: true
      responses: {}
  /debug/pprof/heap:
    get:
      operationId: heap
      responses: {}
  /debug/pprof/heap/flamegraph:
    get:
      operationId: flame_graph
      responses: {}
  /v2/admin/_count-download:
    patch:
      operationId: countDownload
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DownloadBody"
        required: true
      responses:
        "204":
          description: Download counted successfully
        "400":
          description: Invalid input
  /v2/admin/_force_reindex:
    post:
      operationId: forceReindex
      responses:
        "204":
          description: Search index rebuilt successfully
        "401":
          description: Unauthorized
  /v2/auth/2fa:
    post:
      operationId: finish2faFlow
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Login2FA"
        required: true
      responses:
        "200":
          description: 2FA enabled
        "401":
          description: Unauthorized
      security:
        - bearer_auth: []
    delete:
      operationId: remove2fa
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Remove2FA"
        required: true
      responses:
        "204":
          description: 2FA removed
        "401":
          description: Unauthorized
      security:
        - bearer_auth: []
  /v2/auth/2fa/get_secret:
    post:
      operationId: begin2faFlow
      responses:
        "200":
          description: 2FA secret generated
        "401":
          description: Unauthorized
      security:
        - bearer_auth: []
  /v2/auth/callback:
    get:
      operationId: authCallback
      responses:
        "307":
          description: Redirect with auth code
        "401":
          description: Authentication failed
  /v2/auth/create:
    post:
      operationId: createAccountPassword
      requestBody:
        content:
          application/json:
