    ProjectStatus:
      type: string
      description: >-
        A status decides the visibility of a project in search, URLs, and the
        whole site itself.

        Approved - Project is displayed on search, and accessible by URL

        Rejected - Project is not displayed on search, and not accessible by URL
        (Temporary state, project can reapply)

        Draft - Project is not displayed on search, and not accessible by URL

        Unlisted - Project is not displayed on search, but accessible by URL

        Withheld - Same as unlisted, but set by a moderator. Cannot be switched
        to another type without moderator approval

        Processing - Project is not displayed on search, and not accessible by
        URL (Temporary state, project under review)

        Scheduled - Project is scheduled to be released in the future

        Private - Project is approved, but is not viewable to the public
      enum:
        - approved
        - archived
        - rejected
        - draft
        - unlisted
        - processing
        - withheld
        - scheduled
        - private
        - unknown
