      required:
        - locked
        - is_own_lock
      properties:
        expired:
          type:
            - boolean
            - "null"
          description: Whether the lock has expired
        expires_at:
          type:
            - string
            - "null"
          format: date-time
          description: When the lock expires
        is_own_lock:
          type: boolean
          description: Whether the requesting user holds the lock
        locked:
          type: boolean
          description: Whether the project is currently locked
        locked_at:
          type:
            - string
            - "null"
          format: date-time
          description: When the lock was acquired
        locked_by:
          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/LockedByUser"
