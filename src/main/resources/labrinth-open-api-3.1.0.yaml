components:
  schemas:
    AddReport:
      type: object
      description: See [`add_report`].
      required:
        - file_id
      properties:
        file_id:
          $ref: "#/components/schemas/FileId"
    AffiliateCodeAnalytics:
      allOf:
        - $ref: "#/components/schemas/AffiliateCodeMetrics"
          description: Metrics collected.
        - type: object
          required:
            - source_affiliate_code
          properties:
            source_affiliate_code:
              $ref: "#/components/schemas/AffiliateCodeId"
              description: What affiliate code these metrics are for.
      description: Affiliate code metrics.
    AffiliateCodeClicks:
      type: object
      description: "[`super::ReturnMetrics::affiliate_code_clicks`]."
      required:
        - clicks
      properties:
        clicks:
          type: integer
          format: int64
          description: Total clicks for this bucket.
          minimum: 0
    AffiliateCodeConversions:
      type: object
      description: "[`super::ReturnMetrics::affiliate_code_conversions`]."
      required:
        - conversions
      properties:
        conversions:
          type: integer
          format: int64
          description: Total conversions for this bucket.
          minimum: 0
    AffiliateCodeId:
      type: string
    AffiliateCodeMetrics:
      oneOf:
        - allOf:
            - $ref: "#/components/schemas/AffiliateCodeClicks"
            - type: object
              required:
                - metric_kind
              properties:
                metric_kind:
                  type: string
                  enum:
                    - clicks
        - allOf:
            - $ref: "#/components/schemas/AffiliateCodeConversions"
            - type: object
              required:
                - metric_kind
              properties:
                metric_kind:
                  type: string
                  enum:
                    - conversions
        - allOf:
            - $ref: "#/components/schemas/AffiliateCodeRevenue"
            - type: object
              required:
                - metric_kind
              properties:
                metric_kind:
                  type: string
                  enum:
                    - revenue
      description: >-
        Affiliate code metrics of a specific kind.


        If a field is not included in [`Metrics::bucket_by`], it will be
        [`None`].
    AffiliateCodeRevenue:
      type: object
      description: "[`super::ReturnMetrics::affiliate_code_revenue`]."
      required:
        - revenue
      properties:
        revenue:
          type: string
          description: Total revenue for this bucket.
    AnalyticsData:
      oneOf:
        - $ref: "#/components/schemas/ProjectAnalytics"
          description: Project metrics.
        - $ref: "#/components/schemas/AffiliateCodeAnalytics"
      description: Metrics collected in a single time slice.
    AnalyticsEvent:
      allOf:
        - $ref: "#/components/schemas/AnalyticsEventMeta"
        - type: object
          required:
            - id
            - starts
            - ends
          properties:
            ends:
              type: string
              format: date-time
            id:
              $ref: "#/components/schemas/AnalyticsEventId"
            starts:
              type: string
              format: date-time
    AnalyticsEventId:
      type: string
    AnalyticsEventMeta:
      type: object
      properties:
        announcement_url:
          type:
            - string
            - "null"
        for_metric_kind:
          type: array
          items:
            $ref: "#/components/schemas/MetricKind"
          uniqueItems: true
        title:
          type: string
    AnalyticsEventUpsert:
      allOf:
        - $ref: "#/components/schemas/AnalyticsEventMeta"
        - type: object
          required:
            - starts
            - ends
          properties:
            ends:
              type: string
              format: date-time
            starts:
              type: string
              format: date-time
    AnalyticsFacets:
