    ReportIssueDetail:
      type: object
      description: |-
        The details of a Delphi report issue, which contain data about a
        Java class affected by it. Every Delphi report issue details object
        belongs to a specific issue, and an issue can have zero, one, or
        more details attached to it. (Some issues may be artifact-wide,
        or otherwise not really specific to any particular class.)
      required:
        - id
        - issue_id
        - key
        - file_path
        - data
        - severity
        - status
      properties:
        data:
          type: object
          description: Extra detail-specific info for this detail.
          additionalProperties: {}
          propertyNames:
            type: string
        decompiled_source:
          type:
            - string
            - "null"
          description: Decompiled, pretty-printed source of the Java class.
        file_path:
          type: string
          description: Name of the Java class path in which this issue was found.
        id:
          $ref: "#/components/schemas/DelphiReportIssueDetailsId"
          description: ID of this issue detail.
        issue_id:
          $ref: "#/components/schemas/DelphiReportIssueId"
          description: ID of the issue this detail belongs to.
        jar:
          type:
            - string
            - "null"
          description: >-
            If this detail was found inside a JAR embedded inside the scanned
            JAR,

            this will point to the path of that JAR inside the outer JAR.
        key:
          type: string
          description: >-
            Opaque identifier for where this issue detail is located, relative
            to

            the file scanned.


            This acts as a stable identifier for an issue detail, even across

            different versions of the same file.
        severity:
          $ref: "#/components/schemas/DelphiSeverity"
          description: How important is this issue, as flagged by Delphi?
        status:
          $ref: "#/components/schemas/DelphiStatus"
          description: Has this issue detail been marked as safe or unsafe?
