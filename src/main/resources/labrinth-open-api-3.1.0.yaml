        hide_identity:
          type: boolean
        id:
          $ref: "#/components/schemas/ThreadMessageId"
    ThreadMessageId:
      type: string
    ThreadType:
      type: string
      enum:
        - report
        - project
        - direct_message
    TimeRange:
      type: object
      description: Time range for fetching analytics.
      required:
        - start
        - end
        - resolution
      properties:
        end:
          type: string
          format: date-time
          description: When to stop including data.
        resolution:
          $ref: "#/components/schemas/TimeRangeResolution"
          description: |-
            Determines how many time slices between the start and end will be
            included, and how fine-grained those time slices will be.

            This must fall within the bounds of [`MIN_RESOLUTION`] and
            [`MAX_TIME_SLICES`].
        start:
          type: string
          format: date-time
          description: When to start including data.
    TimeRangeResolution:
      oneOf:
        - type: object
          description: >-
            Use a set number of time slices, with the resolution being
            determined

            automatically.
          required:
            - slices
          properties:
            slices:
              type: integer
              format: int64
              description: >-
                Use a set number of time slices, with the resolution being
                determined

                automatically.
              minimum: 0
        - type: object
          description: >-
            Each time slice will be a set number of minutes long, and the number
            of

            slices is determined automatically.
          required:
            - minutes
          properties:
            minutes:
              type: integer
              format: int64
              description: >-
                Each time slice will be a set number of minutes long, and the
                number of

                slices is determined automatically.
              minimum: 0
      description: |-
        Determines how many time slices between the start and end will be
        included, and how fine-grained those time slices will be.
    TimeSlice:
      type: array
      items:
        $ref: "#/components/schemas/AnalyticsData"
      description: Single time interval of metrics collection.
    TransactionItem:
      oneOf:
        - type: object
          description: User withdrew some of their available payout.
          required:
            - id
            - status
            - created
            - amount
            - type
          properties:
            amount:
              type: string
              description: How much the user got from this payout, excluding fees.
            created:
              type: string
              format: date-time
              description: When the payout was created.
            fee:
              type:
                - string
                - "null"
              description: How much the user paid in fees for this payout, on top of `amount`.
            id:
              $ref: "#/components/schemas/PayoutId"
              description: ID of the payout.
            method_address:
              type:
                - string
                - "null"
              description: >-
                Payout-method-specific address which the payout was sent to,
                like

                an email address.
            method_id:
              type:
                - string
                - "null"
              description: >-
                Payout-method-specific ID for the type of payout the user got.


                - Tremendous: the rewarded gift card ID.

                - Mural: the payment rail code used.
                  - Blockchain: `blockchain-usdc-polygon`.
                  - Fiat: see [`muralpay::FiatAndRailCode`].
                - PayPal: `paypal_us`.

                - Venmo: `venmo`.


                For legacy transactions, this may be [`None`] as we did not
                always

                store this payout info.
            method_type:
              oneOf:
                - type: "null"
                - $ref: "#/components/schemas/PayoutMethodType"
                  description: What payout method type was used for this.
            status:
              $ref: "#/components/schemas/PayoutStatus"
              description: Status of this payout.
            type:
              type: string
              enum:
                - withdrawal
        - type: object
          description: User got a payout available for them to withdraw.
          required:
            - created
            - payout_source
            - amount
            - type
          properties:
            amount:
              type: string
              description: How much the payout was worth.
            created:
              type: string
              format: date-time
              description: When this payout was made available for the user to withdraw.
            payout_source:
              $ref: "#/components/schemas/PayoutSource"
              description: Where this payout came from.
            type:
              type: string
              enum:
                - payout_available
      description: User performing a payout-related action.
