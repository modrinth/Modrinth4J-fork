      type: object
      required:
        - hashes
      properties:
        algorithm:
          type:
            - string
            - "null"
        hashes:
          type: array
          items:
            type: string
    FileId:
      type: string
    FileIssue:
      type: object
      description: >-
        Issue raised by Delphi in a flagged file.


        The issue is scoped to the JAR, not any specific class, but issues can
        be

        raised because they appeared in a class - see [`FileIssueDetails`].
      required:
        - id
        - report_id
        - issue_type
      properties:
        details:
          type: array
          items:
            $ref: "#/components/schemas/ReportIssueDetail"
          description: >-
            Details of why this issue might have been raised, such as what file
            it

            was found in.
        id:
          $ref: "#/components/schemas/DelphiReportIssueId"
          description: ID of the issue.
        issue_type:
          type: string
          description: >-
            Delphi-determined kind of issue that this is, e.g.
            `OBFUSCATED_NAMES`.


            Labrinth does not know the full set of kinds of issues, so this is
            kept

            as a string.
        report_id:
          $ref: "#/components/schemas/DelphiReportId"
          description: ID of the report this issue is a part of.
    FileReport:
      type: object
      required:
        - report_id
        - file_id
        - created
        - flag_reason
        - severity
        - file_name
        - file_size
        - download_url
      properties:
        created:
          type: string
          format: date-time
          description: When the report for this file was created.
        download_url:
          type: string
          description: URL to download the flagged file.
        file_id:
          $ref: "#/components/schemas/FileId"
          description: ID of the file that was scanned.
        file_name:
          type: string
          description: Name of the flagged file.
        file_size:
          type: integer
          format: int32
          description: Size of the flagged file, in bytes.
        flag_reason:
          $ref: "#/components/schemas/FlagReason"
          description: Why this project was flagged.
        issues:
          type: array
          items:
            $ref: "#/components/schemas/FileIssue"
          description: What issues appeared in the file.
        report_id:
          $ref: "#/components/schemas/DelphiReportId"
          description: ID of this report.
        severity:
          $ref: "#/components/schemas/DelphiSeverity"
          description: According to this report, how likely is the project malicious?
    FileType:
      type: string
      enum:
        - required-resource-pack
        - optional-resource-pack
