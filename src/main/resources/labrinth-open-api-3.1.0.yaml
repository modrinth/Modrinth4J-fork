      description: Recorded ping attempt that Labrinth made to a Minecraft Java server
        project.
      required:
        - when
        - address
      properties:
        address:
          type: string
          description: Address of the server at the time of the ping.
        data:
          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/JavaServerPingData"
              description: If the ping was successful, info on the ping response.
        when:
          type: string
          format: date-time
          description: When the ping was performed.
    JavaServerPingData:
      type: object
      description: Ping response data for a Minecraft Java server.
      required:
        - latency
        - version_name
        - version_protocol
        - description
        - players_online
        - players_max
      properties:
        description:
          type: string
          description: Description/MOTD of the server as shown in the server list.
        latency:
          type: string
          description: >-
            How long it took for the Labrinth worker to ping the server.


            Note: this is explicitly *not* a client-side ping time, so this
            should

            not be used to display to a client how much latency they have to a

            specific server. This is purely for internal metrics.
        players_max:
          type: integer
          format: int32
          description: Maximum number of players allowed on the server.
        players_online:
          type: integer
          format: int32
          description: Number of players online at the time.
        version_name:
          type: string
          description: Reported version name of the server.
        version_protocol:
          type: integer
          format: int32
          description: Reported version protocol number of the server.
